<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="power-preference" content="high-performance">
  <title>WebAR - Portail Magique Invisible</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.3s ease-out;
    }
    #status { color: #fff; margin-bottom: 20px; text-align: center; padding: 0 20px;}
    #start-btn {
      padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
      color: white; background: #00D084; border: none; border-radius: 5px; 
      cursor: pointer; display: none;
      box-shadow: 0 0 10px rgba(0, 208, 132, 0.5);
    }
    .hidden { opacity: 0; pointer-events: none; }
  </style>

  <script>
    // =================================================================
    // 1. SHADER CHROMAKEY (Transparence Fond Vert)
    // =================================================================
    AFRAME.registerShader('chromakey', {
      schema: {
        src: {type: 'map', is: 'uniform'},
        color: {default: {x: 0.1, y: 0.9, z: 0.2}, type: 'vec3', is: 'uniform'},
        transparent: {default: true, is: 'uniform'}
      },
      init: function (data) {
        var videoTexture = new THREE.VideoTexture(data.src);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.format = THREE.RGBAFormat; 
        
        this.material = new THREE.ShaderMaterial({
          uniforms: {
            color: { type: 'c', value: new THREE.Color(data.color.x, data.color.y, data.color.z) },
            src: { type: 't', value: videoTexture }
          },
          vertexShader: `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
          `,
          fragmentShader: `
            precision mediump float; 
            uniform vec3 color;
            uniform sampler2D src;
            varying vec2 vUv;
            void main() {
              vec4 tex = texture2D(src, vUv);
              float alpha = (length(tex.rgb - color) - 0.5) * 7.0;
              gl_FragColor = vec4(tex.rgb, alpha);
            }
          `,
          transparent: data.transparent,
          side: THREE.FrontSide
        });
      },
      update: function (data) {
        this.material.uniforms.color.value.setRGB(data.color.x, data.color.y, data.color.z);
      }
    });

    // =================================================================
    // 2. MASQUE D'OCCLUSION (BLINDÉ CONTRE L'INVISIBILITÉ VISIBLE)
    // =================================================================
    AFRAME.registerComponent('auto-portal-mask', {
      schema: {
        width: {type: 'number', default: 1}, 
        height: {type: 'number', default: 1} 
      },
      update: function () {
        // Nettoyage si on met à jour
        while (this.el.firstChild) { this.el.removeChild(this.el.firstChild); }

        const w = this.data.width;
        const h = this.data.height;
        const b = 10; // Épaisseur des murs invisibles

        // Fonction interne pour générer un mur d'occlusion TOTALEMENT invisible
        const createWall = (x, y, ww, wh) => {
          // Utilisation de la primitive a-plane pour une meilleure gestion du matériel par défaut
          const wall = document.createElement('a-plane');
          wall.setAttribute('width', ww);
          wall.setAttribute('height', wh);
          
          // === LE FIX ===
          // On définit un matériel complet qui n'accepte pas la lumière et ne dessine aucune couleur
          wall.setAttribute('material', {
            shader: 'flat', // Inutile de calculer des lumières sur un occluder
            colorWrite: false, // Technique standard pour un occluder invisible mais efficace
            depthTest: true,
            visible: true, // L'entité doit être visible pour appliquer le matériel, colorWrite s'occupe de l'invisibilité
            side: 'double'
          });

          // Position Z très légère pour occlure juste devant l'affiche
          wall.setAttribute('position', `${x} ${y} 0.01`); 
          
          this.el.appendChild(wall);
        };

        // Création des 4 murs autour de l'affiche
        createWall(0, (h / 2) + (b / 2), w + (b * 2), b); // Haut
        createWall(0, -(h / 2) - (b / 2), w + (b * 2), b); // Bas
        createWall(-(w / 2) - (b / 2), 0, b, h); // Gauche
        createWall((w / 2) + (b / 2), 0, b, h); // Droit
      }
    });

    // =================================================================
    // 3. CONTROLEUR DE LECTURE (Performance)
    // =================================================================
    AFRAME.registerComponent('smart-target', {
      init: function() {
        const el = this.el;
        this.video = el.dataset.videoId ? document.getElementById(el.dataset.videoId) : null;
        this.audio = el.dataset.audioId ? document.getElementById(el.dataset.audioId) : null;

        el.addEventListener('targetFound', () => {
          if (this.video) this.video.play();
          if (this.audio) this.audio.play();
        });

        el.addEventListener('targetLost', () => {
          if (this.video) this.video.pause();
          if (this.audio) this.audio.pause();
        });
      }
    });
  </script>
</head>

<body>
  <div id="overlay">
    <div id="status">Recherche des assets en cours...</div>
    <button id="start-btn">DÉMARRER</button>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; maxTrack: 1; filterMinCF:0.0001; filterBeta: 0.001;" 
    color-space="sRGB" 
    renderer="colorManagement: true; physicallyCorrectLights: false; antialias: false; sortObjects: true; precision: mediump;" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets id="assets-loader" timeout="10000"></a-assets>
    
    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
    
    <a-entity id="targets-container"></a-entity>
  </a-scene>

  <script>
    // =================================================================
    // 4. SCANNER ET GÉNÉRATEUR D'ASSETS
    // =================================================================
    const MAX_TARGETS = 10; 
    const ASSETS_PATH = './assets/';
    const assetsContainer = document.getElementById('assets-loader');
    const targetsContainer = document.getElementById('targets-container');
    const startBtn = document.getElementById('start-btn');
    const statusText = document.getElementById('status');

    // Système de cache pour alléger le réseau
    const cache = {};
    async function checkFileExists(url) {
      if (cache[url] !== undefined) return cache[url];
      try { 
        const res = await fetch(url, { method: 'HEAD' });
        cache[url] = res.ok;
        return res.ok;
      } catch { 
        cache[url] = false;
        return false; 
      }
    }

    async function initExperience() {
      let count = 0;
      const docFragAssets = document.createDocumentFragment();
      const docFragTargets = document.createDocumentFragment();

      for (let i = 0; i < MAX_TARGETS; i++) {
        const [hasGlb, hasMp3, hasMp4] = await Promise.all([
          checkFileExists(`${ASSETS_PATH}${i}.glb`),
          checkFileExists(`${ASSETS_PATH}${i}.mp3`),
          checkFileExists(`${ASSETS_PATH}${i}.mp4`)
        ]);

        if (!hasGlb && !hasMp3 && !hasMp4) continue;
        count++;

        const targetEl = document.createElement('a-entity');
        targetEl.setAttribute('mindar-image-target', `targetIndex: ${i}`);
        
        let currentRatio = 1; // Ratio par défaut

        // --- A. VIDÉO (.mp4) ---
        if (hasMp4) {
          const vidId = `video-${i}`;
          const video = document.createElement('video');
          video.id = vidId;
          video.src = `${ASSETS_PATH}${i}.mp4`;
          video.setAttribute('preload', 'auto');
          video.setAttribute('loop', 'true');
          video.setAttribute('crossorigin', 'anonymous');
          video.setAttribute('playsinline', '');
          video.setAttribute('webkit-playsinline', '');
          video.muted = true; 
          video.setAttribute('muted', '');
          
          docFragAssets.appendChild(video);
          targetEl.dataset.videoId = vidId;

          const videoPlane = document.createElement('a-entity');
          videoPlane.setAttribute('geometry', 'primitive: plane; width: 1; height: 1');
          videoPlane.setAttribute('position', '0 0 0');
          videoPlane.setAttribute('material', `shader: chromakey; src: #${vidId}; color: 0.1 0.9 0.2; transparent: true`);
          
          targetEl.appendChild(videoPlane);

          // Redimensionnement + Création du portail dynamique
          video.addEventListener('loadedmetadata', () => {
             currentRatio = video.videoHeight / video.videoWidth;
             videoPlane.setAttribute('geometry', {primitive: 'plane', width: 1, height: currentRatio});
             
             // Ajoute le masque d'occlusion autour de la vidéo
             const portalMask = document.createElement('a-entity');
             portalMask.setAttribute('auto-portal-mask', `width: 1; height: ${currentRatio}`);
             targetEl.appendChild(portalMask);
          }, { once: true });
        } else {
          // S'il n'y a pas de vidéo, on crée quand même un masque 1x1 standard pour le modèle 3D
          const portalMask = document.createElement('a-entity');
          portalMask.setAttribute('auto-portal-mask', `width: 1; height: 1`);
          targetEl.appendChild(portalMask);
        }

        // --- B. AUDIO (.mp3) ---
        if (hasMp3) {
          const audio = document.createElement('audio');
          audio.id = `audio-${i}`;
          audio.src = `${ASSETS_PATH}${i}.mp3`;
          audio.setAttribute('loop', 'true');
          docFragAssets.appendChild(audio);
          targetEl.dataset.audioId = audio.id;
        }

        // --- C. MODÈLE 3D (.glb) : EFFET PARALLAXE ---
        if (hasGlb) {
          const model = document.createElement('a-entity');
          model.setAttribute('gltf-model', `${ASSETS_PATH}${i}.glb`);
          model.setAttribute('scale', '0.5 0.5 0.5');
          // IMPORTANT: Z à -1 pour enfoncer le modèle derrière l'affiche physique
          model.setAttribute('position', '0 0 -1'); 
          model.setAttribute('animation-mixer', '');
          targetEl.appendChild(model);
        }

        targetEl.setAttribute('smart-target', '');
        docFragTargets.appendChild(targetEl);
      }

      // Injection globale dans le DOM
      assetsContainer.appendChild(docFragAssets);
      targetsContainer.appendChild(docFragTargets);

      statusText.innerText = count > 0 ? "Prêt. Cliquez pour démarrer." : "Aucun asset trouvé.";
      if (count > 0) startBtn.style.display = 'block';
    }

    initExperience();

    // =================================================================
    // 5. BOUTON DÉMARRER (Déblocage des médias iOS/Android)
    // =================================================================
    startBtn.addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      
      const vids = document.querySelectorAll('video');
      vids.forEach(v => {
        const p = v.play();
        if(p !== undefined) {
            p.then(() => v.pause()).catch(e => console.error(e));
        }
      });

      const audios = document.querySelectorAll('audio');
      audios.forEach(a => {
        const p = a.play();
        if(p !== undefined) {
            p.then(() => a.pause()).catch(e => console.error(e));
        }
      });

      const arSys = document.querySelector('a-scene').systems['mindar-image-system'];
      if(arSys) arSys.start();
    });
  </script>
</body>
</html>
